<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRM Dashboard Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>SRM Dashboard</h1>
            <p>Login using your SRM credentials</p>

            <div class="form-box">

                <h2>Login</h2>

                <form id="loginForm">

                    <input
                        type="text"
                        id="login_reg_no"
                        placeholder="Registration Number"
                        required
                    >

                    <input
                        type="password"
                        id="login_password"
                        placeholder="SRM Password"
                        required
                    >

                    <button type="submit">
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
